<div class="bg-neutral-100 rounded p-4 space-y-4">
    <div class="space-y-2">
        <h2 class="text-lg font-bold">Transferencia del {{ date() }}</h2>
        <p class="opacity-60">Status: <span>{{ title(status()) }}</span></p>
    </div>
    <div class="space-y-2">
        <h3 class="font-semibold">Resumen</h3>
        <ul class="ml-4">
            <li class="flex gap-2 items-center">
                <div role="presentation" class="size-3 rounded-full bg-neutral-300"></div>
                <p>Pendiente <span class="opacity-60">({{ pending() }})</span></p>
            </li>
            <li class="flex gap-2 items-center">
                <div role="presentation" class="size-3 rounded-full bg-green-500"></div>
                <p>Éxito <span class="opacity-60">({{ success() }})</span></p>
            </li>
            <li class="flex gap-2 items-center">
                <div role="presentation" class="size-3 rounded-full bg-red-500"></div>
                <p>Fracaso <span class="opacity-60">({{ failure() }})</span></p>
            </li>
        </ul>
    </div>
    <div class="flex bg-neutral-300 h-2 w-full rounded-full overflow-hidden">
        <div class="last:rounded-e-full bg-green-500 h-full" [style]="`width: calc(${success()}/${total()} * 100%)`"></div>
        <div class="last:rounded-e-full bg-red-500 h-full" [style]="`width: calc(${failure()}/${total()} * 100%)`"></div>
    </div>
</div>
